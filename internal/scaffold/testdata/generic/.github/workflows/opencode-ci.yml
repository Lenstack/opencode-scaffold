name: OpenCode CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  discovery-check:
    name: "Discovery Freshness"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ocs
        run: go install github.com/Lenstack/opencode-scaffold@latest
      - run: ocs discover --full
